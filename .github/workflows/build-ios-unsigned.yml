name: Build Unsigned iOS IPA

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications/ | grep Xcode

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate iOS project (Prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build Unsigned iOS App
        run: |
          cd ios

          # Print directory so we can confirm the workspace was created
          echo "--- ios/ Directory Contents ---"
          ls -la
          echo "-------------------------------"

          # Dynamically detect the workspace and scheme names
          WORKSPACE=$(ls *.xcworkspace | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building workspace: $WORKSPACE with scheme: $SCHEME"

          # Build for physical device, skipping all code signing requirements
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CONFIGURATION_BUILD_DIR=$(pwd)/build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            clean build 2>&1 | tail -200

      - name: Package into .ipa
        run: |
          cd ios
          echo "--- Build Output ---"
          ls build/
          echo "--------------------"
          mkdir -p Payload
          cp -R build/*.app Payload/
          zip -qr SmartBusPlanner-unsigned.ipa Payload
          echo "IPA created successfully!"
          ls -lh SmartBusPlanner-unsigned.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartBusPlanner-Unsigned-IPA
          path: ios/SmartBusPlanner-unsigned.ipa
          retention-days: 7
