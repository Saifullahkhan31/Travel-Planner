name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications/ | grep Xcode

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate iOS project (Prebuild)
        env:
          EXPO_NO_GIT_STATUS: 1
          # Pulled from GitHub repo Secrets (Settings → Secrets → Actions)
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx expo prebuild --platform ios --clean

      - name: Verify Podfile exists & Show ios folder
        run: |
          echo "--- Root ios/ folder contents ---"
          ls -la ios/
          echo "---------------------------------"
          if [ ! -f ios/Podfile ]; then
            echo "ERROR: Podfile not found! Prebuild may have failed."
            exit 1
          fi
          echo "Podfile found!"

      - name: Patch Podfile (Fix expo-sharing Xcode 16.2 Swift compatibility)
        run: |
          python3 - << 'PYEOF'
          with open('ios/Podfile', 'r') as f:
              content = f.read()

          patch = """
            # Fix: Force Swift 5 mode for ALL pods - prevents Xcode 16.2 Swift 6 strict mode errors
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['SWIFT_VERSION'] = '5.0'
                config.build_settings['SWIFT_TREAT_WARNINGS_AS_ERRORS'] = 'NO'
                config.build_settings['GCC_TREAT_WARNINGS_AS_ERRORS'] = 'NO'
              end
            end
          """

          if 'react_native_post_install' in content:
              content = content.replace('  react_native_post_install(installer', patch + '\n  react_native_post_install(installer', 1)
              print("SUCCESS: Podfile patched with Swift 5 mode fix!")
          else:
              content += '\npost_install do |installer|\n' + patch + '\nend\n'
              print("SUCCESS: Podfile patched with fallback post_install block!")

          with open('ios/Podfile', 'w') as f:
              f.write(content)
          PYEOF
          echo "--- Last 30 lines of patched Podfile ---"
          tail -30 ios/Podfile
          echo "----------------------------------------"

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
          echo "--- ios/ after pod install ---"
          ls -la
          echo "------------------------------"

      - name: Verify .xcworkspace exists
        run: |
          WORKSPACE=$(ls -d ios/*.xcworkspace 2>/dev/null | head -n 1)
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: No .xcworkspace found! pod install may have failed."
            ls -la ios/
            exit 1
          fi
          echo "Workspace found: $WORKSPACE"

      - name: Build Unsigned iOS App
        run: |
          set -eo pipefail
          cd ios

          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building: $WORKSPACE / scheme: $SCHEME"

          # Export NODE_BINARY so Xcode's 'Bundle React Native code and images'
          # build phase can find Node.js and actually bundle the JavaScript.
          # Without this, the JS bundle is silently skipped → white screen + tiny IPA.
          if [ -f .xcode.env.local ]; then
            source .xcode.env.local
          elif [ -f .xcode.env ]; then
            source .xcode.env
          fi
          export NODE_BINARY=$(which node)
          echo "NODE_BINARY set to: $NODE_BINARY"

          # Use -derivedDataPath so ALL build products (including .modulemap files)
          # stay in ONE consistent location. This fixes the ExpoModulesCore not found error
          # that happens when CONFIGURATION_BUILD_DIR splits intermediates across directories.
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./DerivedData \
            NODE_BINARY="$NODE_BINARY" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            clean build

      - name: Package into .ipa
        run: |
          set -eo pipefail
          cd ios

          # The .app is now in DerivedData/Build/Products/Release-iphoneos/
          echo "--- DerivedData Build Products ---"
          ls DerivedData/Build/Products/
          echo "----------------------------------"

          APP_PATH=$(ls -d DerivedData/Build/Products/Release-iphoneos/*.app | head -n 1)
          echo "Found app: $APP_PATH"

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr SmartBusPlanner-unsigned.ipa Payload
          ls -lh SmartBusPlanner-unsigned.ipa
          echo "SUCCESS: IPA is ready!"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartBusPlanner-Unsigned-IPA
          path: ios/SmartBusPlanner-unsigned.ipa
          retention-days: 7
