name: Build Unsigned iOS IPA

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16.1 (Required by React Native)
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16.1*.app | head -n 1)
          echo "Selecting Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate iOS project (Prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build Unsigned iOS App
        run: |
          cd ios
          echo "--- Directory Contents ---"
          ls -la
          echo "--------------------------"
          
          # Automatically detect the workspace name generated by Expo
          WORKSPACE=$(ls *.xcworkspace | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Found workspace: $WORKSPACE with scheme: $SCHEME"
          
          # Compile the app for physical devices (iphoneos) but force Xcode to skip code signing
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CONFIGURATION_BUILD_DIR=$(pwd)/build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            clean build

      - name: Package into .ipa
        run: |
          cd ios
          mkdir Payload
          # Automatically find and copy whatever .app file was generated
          cp -R build/*.app Payload/
          zip -qr SmartBusPlanner.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartBusPlanner-Unsigned
          path: ios/SmartBusPlanner.ipa
