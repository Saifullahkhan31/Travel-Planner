name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications/ | grep Xcode

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate iOS project (Prebuild)
        env:
          EXPO_NO_GIT_STATUS: 1
        run: npx expo prebuild --platform ios --clean

      - name: Verify Podfile exists & Show ios folder
        run: |
          echo "--- Root ios/ folder contents ---"
          ls -la ios/
          echo "---------------------------------"
          if [ ! -f ios/Podfile ]; then
            echo "ERROR: Podfile not found! Prebuild may have failed."
            exit 1
          fi
          echo "Podfile found!"

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
          echo "--- ios/ after pod install ---"
          ls -la
          echo "------------------------------"

      - name: Verify .xcworkspace exists
        run: |
          WORKSPACE=$(ls ios/*.xcworkspace 2>/dev/null | head -n 1)
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: No .xcworkspace found! pod install may have failed."
            ls -la ios/
            exit 1
          fi
          echo "Workspace found: $WORKSPACE"

      - name: Build Unsigned iOS App
        run: |
          set -eo pipefail
          cd ios

          WORKSPACE=$(ls *.xcworkspace | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building: $WORKSPACE / scheme: $SCHEME"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CONFIGURATION_BUILD_DIR=$(pwd)/build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            clean build

      - name: Package into .ipa
        run: |
          set -eo pipefail
          cd ios

          echo "--- build/ contents ---"
          ls -la build/
          echo "-----------------------"

          APP_PATH=$(ls -d build/*.app | head -n 1)
          echo "Found app: $APP_PATH"

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr SmartBusPlanner-unsigned.ipa Payload
          ls -lh SmartBusPlanner-unsigned.ipa
          echo "SUCCESS: IPA is ready!"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartBusPlanner-Unsigned-IPA
          path: ios/SmartBusPlanner-unsigned.ipa
          retention-days: 7
